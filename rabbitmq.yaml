- name: configure rabbitmq service
  hosts: rabbitmq
  becomes: yes
  tasks:
   - name: copy rabbitmq repo
     ansible.builtin.copy:
      src: rabbitmq.repo
      dest: /etc/yum.repos.d/rabbitmq.repo
   - name: install  rabbitmq
     ansible.builtin.dnf:
      name: rabbitmq-server
      state: present
   - name: enable and start the server
     ansible.builtin.service:
      name: rabbitmq-server
      enabled: yes
      state: restarted
   - name: creating rabbitmq user and giving permissions
     community.rabbitmq.rabbitmq_user:
      user: roboshop
      password: roboshop123
      permissions:
       - vhost: /
         configure_priv: .*
         read_priv: .*
         write_priv: .*
      state: present

