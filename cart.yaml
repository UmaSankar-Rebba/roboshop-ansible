- name: configure the cart service
  hosts: cart
  become: yes
  tasks:
    - name: enable nodejs service
      ansible.builtin.command: dnf module enable nodejs:20 -y

    - name: install nodejs service
      ansible.builtin.dnf:
       name: nodejs
       state: present

    - name: creating system user called roboshop
      ansible.builtin.user:
       name: roboshop
       system: true
       home: /app
       shell: /sbin/nologin
       comment: roboshop system user

    - name: deleting existing app directory
      ansible.builtin.file:
       state: absent
       path: /app

    - name: create app directory
      ansible.builtin.file:
       path: /app
       state: directory

    - name: delete existing file
      ansible.builtin.file:
       path: /tmp/catalogue.zip
       state: absent

    - name: downloading the code
      ansible.builtin.get_url:
       url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip
       dest: /tmp/user.zip

    - name: archieve the downloaded code file
      ansible.builtin.unarchive:
       src: /tmp/user.zip
       dest: /app
       remote_src: yes

    - name: downloading the dependies
      community.general.npm:
      path: /app

    - name: copying the cart.service file
      ansible.builtin.copy:
       src: cart.service
       dest: /etc/systemd/system/cart.service

    - name: demeoan reload
      ansible.builtin.systemd_service:
       daemon_reload: true

    - name: starting the systemctl
      ansible.builtin.service:
       name: user
       enabled: yes
       state: restarted





