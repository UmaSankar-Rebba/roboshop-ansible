- name: configuring catalogue server
  hosts: catalogue
  become: yes
  tasks:
    - name: enabling nodejs 20
      ansible.builtin.command: dnf module enable nodejs:20 -y

    - name: install nodejs module
      ansible.builtin.dnf:
       name: nodejs
       state: present

    - name: adding the roboshop username
      ansible.builtin.user:
       name: roboshop
       system: true
       home: /app
       shell: /sbin/nologin
       comment: roboshop system user
    - name: delete app directory
      ansible.builtin.file:
       path: /app
       state: absent

    - name: setup app directory
      ansible.builtin.file:
       path: /app
       state: directory

    - name: delete the existing zip 
      ansible.builtin.file:
       path: /tmp/catalogue.zip
       state: absent

    - name: downloading the code 
      ansible.builtin.get_url:
       url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
       dest: /tmp/catalogue.zip

    - name: unzip the downloaded file
      ansible.builtin.unarchive:
       src: /tmp/catalogue.zip
       dest: /app
    - name: Downloading the dependency libraries
      community.general.npm:
       path: /app
    - name: copying the service file
      ansible.builtin.copy:
       src: catalogue.service
       dest: /etc/systemd/system/catalogue.service

    - name: copying mongo repo file
      ansible.builtin.copy:
       src: mongo.repo
       dest: /etc/yum.repos.d/mongo.repo

    - name: installing mongod 
      ansible.builtin.dnf:
       name: mongod-mongosh
       state: present
    - name: check products loaded or not 
      ansible.builtin.command: mongosh --host "{{ MONGODB_HOST }}" --quiet  --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
      register: catalogue_output

    - name: display the catalogue output
      ansuble.builtin.debug:
       msg: "{{ catalogue_output }}"
    - name: load the  products
      ansible.builtin.shell: mongosh --host "{{ MONGODB_HOST }}" </app/db/master-data.js
      when: catalogue_output.stdout  | int < 0

    - name: starting the systemctl
      ansible.builtin.service:
       name: catalogue
       enabled: yes
       state: restarted
