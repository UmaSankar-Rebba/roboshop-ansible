- name: mongodb configuration
  hosts: mongodb
  become: yes
  tasks:
   - name: coping mongo repo file
     ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo
   - name: installing mongodb server
     ansible.builtin.dnf:
      name: mongodb-org
      state: present
   - name: start the server
     ansible.builtin.service:
      name: mongod
      state: started
      enabled: yes
   - name: replace the content in the file
     ansible.builtin.replace:
      path: /etc/mongod.conf
      regexp: '127.0.0.1'
      replace: '0.0.0.0'
   - name: restart the service
     ansible.builtin.service:
      name: mongod
      state: restarted
      