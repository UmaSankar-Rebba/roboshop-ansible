- name: configuring payment server
  hosts: payment
  become: yes
  tasks:
   - name: installing python 3 
     ansible.builtin.dnf:
      name: "{{ item }}"
      state: present
     loop:
      - python3
      - gcc
      - python3-devel
      
   - name: creating system user roboshop
     ansible.builtin.user:
      name: roboshop
      system: yes
      comment: roboshop system user
      shell: /sbin/nologin
      home: /app

   - name: deleting the existing app directory
     ansible.builtin.file:
      path: /app
      state: absent
    
   - name: creating app directory
     ansible.builtin.file:
      path: /app
      state: directory

   - name: downloading the code
     ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip
      dest: /tmp/payment.zip

   - name: unzip the downloaded code file
     ansible.builtin.unarchive:
      src: /tmp/payment.zip
      dest: /app
      remote_src: yes

   - name: install dependencie
     ansible.builtin.pip:
      requirements: requirements.txt
      executable: pip3.9
     args:
      chdir: /app
  
   - name: copy the payment.service file
     ansible.builtin.template:
      src: payment.service
      dest: /etc/systemd/system/payment.service

   - name: reload the server
     ansible.builtin.systemd_service:
      daemon_reload: true
  
   - name: enable and restsrt the server
     ansible.builtin.service:
      name: payment
      enabled: yes
      state: restarted

  

    